ignore:
  resource_names: []
  field_paths:
    # The SDK `namespace` field is a LIST in every shape; we expose a synthetic
    # scalar Name primary key instead and bridge to/from the list in hooks.
    # Drop the list field from every input/output so it never appears in the CR.
    - CreateNamespaceInput.Namespace
    - CreateNamespaceOutput.Namespace
    - GetNamespaceOutput.Namespace
    # GetTable returns `namespace` as a LIST, but CreateTable takes it as a
    # scalar (modeled as a reference to the Namespace resource). Drop the list
    # output and bridge the scalar back in the read hook.
    - GetTableOutput.Namespace

resources:
  Table:
    fields:
      # Primary key, but MUTABLE via RenameTable. To detect a rename, the read
      # path keys off the stable tableARN (see sdk_read_one_post_build_request)
      # so GetTable returns the CURRENT AWS name; a spec.name change then shows
      # up as a delta and customUpdateTable calls RenameTable.
      Name:
        is_primary_key: true
      # Parent table bucket, referenced by ARN (same-service — no service_name).
      TableBucketARN:
        is_required: true
        is_immutable: true
        references:
          resource: TableBucket
          path: Status.ACKResourceMetadata.ARN
      # Parent namespace, referenced by name (same-service — no service_name).
      # Scalar in the Create/Get/Delete inputs; the list-typed GetTable output
      # member is dropped (see ignore.field_paths) and bridged in a read hook.
      Namespace:
        is_required: true
        is_immutable: true
        references:
          resource: Namespace
          path: Spec.Name
      # Create-only / immutable configuration.
      Format:
        is_immutable: true
      Metadata:
        is_immutable: true
      Metadata.Iceberg.Schema.Fields.Type:
        go_tag: json:"type,omitempty"
      EncryptionConfiguration:
        is_immutable: true
      StorageClassConfiguration:
        is_immutable: true
      # AWS-assigned, used as an optimistic-concurrency guard on delete/rename.
      VersionToken:
        is_read_only: true
        from:
          operation: GetTable
          path: VersionToken
      # Read-only status fields from the flat GetTable response. (tableARN is
      # auto-detected as the primary ARN and surfaced via
      # Status.ACKResourceMetadata.ARN, so it is not modeled as its own field.)
      Type:
        is_read_only: true
        from:
          operation: GetTable
          path: Type
        go_tag: json:"type,omitempty"
      NamespaceID:
        is_read_only: true
        from:
          operation: GetTable
          path: NamespaceId
      TableBucketID:
        is_read_only: true
        from:
          operation: GetTable
          path: TableBucketId
      # metadataLocation is not part of CreateTable; it is read from GetTable
      # and mutated via the dedicated UpdateTableMetadataLocation API. Modeled
      # as a spec field (sourced from the GetTable output) so changes produce a
      # delta that customUpdateTable reconciles via UpdateTableMetadataLocation.
      MetadataLocation:
        from:
          operation: GetTable
          path: MetadataLocation
      WarehouseLocation:
        is_read_only: true
        from:
          operation: GetTable
          path: WarehouseLocation
      CreatedAt:
        is_read_only: true
        from:
          operation: GetTable
          path: CreatedAt
      ModifiedAt:
        is_read_only: true
        from:
          operation: GetTable
          path: ModifiedAt
    exceptions:
      errors:
        404:
          code: NotFoundException
      terminal_codes:
        - BadRequestException
    hooks:
      # metadataLocation is a Put-only field (not part of CreateTable; applied
      # via UpdateTableMetadataLocation). When desired, requeue after create so
      # the next reconciliation detects the delta and customUpdateTable syncs it.
      sdk_create_post_set_output:
        template_path: hooks/table/sdk_create_post_set_output.go.tpl
      # GetTable accepts name triplet OR tableArn; clear tableArn so the read
      # uses the name triplet (ACK populates both).
      sdk_read_one_post_build_request:
        template_path: hooks/table/sdk_read_one_post_build_request.go.tpl
      # GetTable returns namespace as a list; bridge resp.Namespace[0] back into
      # the scalar Spec.Namespace and fetch tags via ListTagsForResource.
      sdk_read_one_post_set_output:
        template_path: hooks/table/sdk_read_one_post_set_output.go.tpl
    # No generic Update API: name is changed via RenameTable, tags via
    # TagResource/UntagResource. Everything else is immutable.
    update_operation:
      custom_method_name: customUpdateTable
  Namespace:
    fields:
      # Synthetic scalar primary key. NOT derived from an SDK field (the SDK
      # `namespace` create field is a LIST). Bridged to/from the list and the
      # scalar Get/Delete input via hooks.
      Name:
        type: "*string"
        is_primary_key: true
        is_immutable: true
      TableBucketARN:
        is_immutable: true
        references:
          resource: TableBucket
          path: Status.ACKResourceMetadata.ARN
      # AWS-assigned read-only outputs from GetNamespace.
      CreatedAt:
        is_read_only: true
        from:
          operation: GetNamespace
          path: CreatedAt
      CreatedBy:
        is_read_only: true
        from:
          operation: GetNamespace
          path: CreatedBy
      NamespaceID:
        is_read_only: true
        from:
          operation: GetNamespace
          path: NamespaceId
      TableBucketID:
        is_read_only: true
        from:
          operation: GetNamespace
          path: TableBucketId
    # The Get/Delete inputs take the namespace as a SCALAR (NamespaceName).
    # Rename them to the synthetic scalar primary key Name so ACK populates the
    # request automatically. (Create input/output are LISTs and are dropped via
    # ignore.field_paths; the create list is built from Name in a hook.)
    renames:
      operations:
        GetNamespace:
          input_fields:
            Namespace: Name
        DeleteNamespace:
          input_fields:
            Namespace: Name
    exceptions:
      errors:
        404:
          code: NotFoundException
      terminal_codes:
        - BadRequestException
    hooks:
      sdk_create_post_build_request:
        template_path: hooks/namespace/sdk_create_post_build_request.go.tpl
      # The generated output mapping skips NamespaceId/TableBucketId: the
      # code-generator output loop matches SDK member names (`NamespaceId`,
      # `TableBucketId`) against the resource field keys, which carry ACK's `ID`
      # initialism (`NamespaceID`, `TableBucketID`), so the members don't match
      # and are dropped. (Not caused by the `namespace` list field ignored above
      # — TableBucket hits the same skip with no ignore rule.) This hook
      # populates those AWS-assigned read-only status fields.
      sdk_read_one_post_set_output:
        template_path: hooks/namespace/sdk_read_one_post_set_output.go.tpl
    tags:
      ignore: true

  TableBucket:
    is_arn_primary_key: true
    fields:
      Name:
        is_immutable: true
      CreatedAt:
        is_read_only: true
        from:
          operation: GetTableBucket
          path: CreatedAt
      Type:
        is_read_only: true
        from:
          operation: GetTableBucket
          path: Type
        go_tag: json:"type,omitempty"
      # AWS-assigned unique identifier returned by GetTableBucket.
      TableBucketID:
        is_read_only: true
        from:
          operation: GetTableBucket
          path: TableBucketId
      # GetTableBucket does not return encryption/storage class config; S3 Tables
      # applies server-side defaults. Late initialize them so the defaults are
      # written back to the spec once and drift can still be detected if the
      # values are later changed out of band.
      EncryptionConfiguration:
        late_initialize:
          skip_incomplete_check: {}
      # Cross-resource reference to a KMS Key for SSE-KMS encryption.
      EncryptionConfiguration.KMSKeyARN:
        references:
          resource: Key
          service_name: kms
          path: Status.ACKResourceMetadata.ARN
      StorageClassConfiguration:
        late_initialize:
          skip_incomplete_check: {}
      # Bucket resource policy (JSON). Not in CreateTableBucket/GetTableBucket —
      # managed via the dedicated Put/Get/DeleteTableBucketPolicy APIs, read in a
      # hook and synced in update. No late_initialize: update runs before late-init
      # and treats a nil Policy as "delete", so back-filling spec from a live policy
      # would let an unset spec delete it. Mirrors the S3 controller's Bucket.Policy.
      Policy:
        is_iam_policy: true
        from:
          operation: GetTableBucketPolicy
          path: ResourcePolicy
      # Bucket-level Iceberg maintenance config. Not part of CreateTableBucket
      # or GetTableBucket — managed via the dedicated
      # Put/GetTableBucketMaintenanceConfiguration APIs. Sourced here so the
      # field is generated; populated in the read hook and synced in update.
      #
      # late_initialize: an unset field is left alone. The read hook populates
      # the observed config and late-init copies it into spec, so the AWS
      # default (currently icebergUnreferencedFileRemoval=enabled) is preserved
      # rather than being disabled. We deliberately do NOT hard-code a default,
      # so if the service default changes ACK reflects the actual observed
      # value. To turn maintenance off, set status: disabled explicitly.
      #
      # compare.is_ignored: the generated delta does a whole-map DeepEqual,
      # which never matches a partial spec against the AWS-defaulted observed
      # config and would re-Put every reconcile. customUpdateTableBucket does a
      # field-aware comparison instead (only sub-fields the user declared).
      MaintenanceConfiguration:
        compare:
          is_ignored: true
        from:
          operation: GetTableBucketMaintenanceConfiguration
          path: Configuration
        late_initialize:
          skip_incomplete_check: {}
    exceptions:
      errors:
        404:
          code: NotFoundException
      terminal_codes:
        - BadRequestException
    hooks:
      # Policy and MaintenanceConfiguration are applied via dedicated Put APIs
      # in the update path, not by CreateTableBucket. Nudge Synced=False after
      # create when either is set so the update reconcile runs immediately
      # instead of waiting for the next periodic resync.
      sdk_create_post_set_output:
        template_path: hooks/table_bucket/sdk_create_post_set_output.go.tpl
      sdk_read_one_post_set_output:
        template_path: hooks/table_bucket/sdk_read_one_post_set_output.go.tpl
      # MaintenanceConfiguration is compare.is_ignored (the generated whole-map
      # DeepEqual churns a partial spec against the AWS-defaulted config). Add a
      # field-aware comparison so Spec.MaintenanceConfiguration deltas are still
      # detected and drive an update.
      delta_post_compare:
        code: customDeltaPostCompare(delta, a, b)
    update_operation:
      custom_method_name: customUpdateTableBucket
